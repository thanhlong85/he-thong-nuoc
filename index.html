<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hệ thống lấy nước</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(#2d8cff, #08233d);
      color: white;
      text-align: center;
      padding: 20px;
    }

    .box {
      max-width: 420px;
      margin: auto;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 20px;
    }

    h1 {
      font-size: 26px;
    }

    input {
      width: 90%;
      padding: 15px;
      font-size: 24px;
      text-align: center;
      margin-top: 20px;
      border-radius: 10px;
      border: none;
    }

    button {
      margin-top: 15px;
      width: 95%;
      padding: 15px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    .btn-open { background: #0066ff; }
    .btn-stop { background: #e60000; }

    .msg {
      margin-top: 15px;
      font-weight: bold;
      min-height: 24px;
    }

    .ok { color: #8cffc7; }
    .err { color: #ffd54f; }

    .hint {
      margin-top: 20px;
      color: #00ffff;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>HỆ THỐNG LẤY NƯỚC</h1>

  <input id="code" placeholder="Nhập mã 4 số" maxlength="4">

  <button class="btn-open" onclick="openWater()">MỞ NƯỚC</button>
  <button class="btn-stop" onclick="stopWater()">TẮT NGAY</button>

  <div class="msg" id="msg"></div>
</div>

<script>
const URL = "https://he-thong-nuoc-default-rtdb.asia-southeast1.firebasedatabase.app";
let lastTs = 0;

function setMsg(t, c="") {
  let m = document.getElementById("msg");
  m.className = "msg " + c;
  m.innerText = t;
}

async function send(data) {
  lastTs = Date.now();

  await fetch(URL + "/result.json", {
    method: "PUT",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({status:"WAIT", ts:lastTs})
  });

  data.ts = lastTs;

  await fetch(URL + "/request.json", {
    method: "PUT",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });

  setTimeout(check, 2500);
}

function openWater() {
  let code = document.getElementById("code").value.trim();

  if (!/^\d{4}$/.test(code)) {
    setMsg("Nhập đúng 4 số!", "err");
    return;
  }

  setMsg("Đang mở...", "ok");
  send({action:"open", code:code});
}

function stopWater() {
  setMsg("Đang tắt...", "ok");
  send({action:"stop"});
}

async function check() {
  let r = await fetch(URL + "/result.json");
  let d = await r.json();

  if (!d || d.ts !== lastTs) {
    setMsg("Không có phản hồi!", "err");
    return;
  }

  if (d.status === "OK") setMsg("Mở nước thành công!", "ok");
  else if (d.status === "SAI_MA") setMsg("Sai mã!", "err");
  else if (d.status === "STOP_OK") setMsg("Đã tắt!", "ok");
  else setMsg("Đang xử lý...");
}
</script>

</body>
</html>
